version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
      docker-actions:
        patterns:
          - "docker/*"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github_actions"

  - package-ecosystem: "vcpkg"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - "dependencies"

  - package-ecosystem: "pip"
    directory: "/.github/requirements"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Chicago"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
