name: linux-appimage

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
    paths-ignore:
      - ".*"
      - "**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    env:
      APPIMAGE_DEPS_DIR: ${{ github.workspace }}/.deps/appimage-${{ matrix.arch }}
      APPIMAGE_CCACHE_DIR: ${{ github.workspace }}/.ccache/appimage-${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: release
        shell: bash
        env:
          RELEASE_TAG_CREATED: ${{ github.event.created }}
        run: tools/ci_validate_release_tag.sh
      - name: Login to Docker Hub (optional)
        # Only run on trusted contexts (not forked PRs), otherwise the
        # `secrets` context is unavailable and would error.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Enable QEMU for cross-arch containers
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
        with:
          platforms: all
      - name: Ensure binfmt for aarch64 is registered
        shell: bash
        run: |
          set -euo pipefail
          source tools/ci-dependency-pins.env
          docker run --privileged --rm "$TONISTIIGI_BINFMT_IMAGE" --install aarch64 || true
      - name: Prepare artifact naming
        id: names
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'
          if [ "$REF_TYPE" = 'tag' ] && [ -n "$REF_NAME" ]; then
            out="dist/dsd-neo-linux-${arch}-portable-${REF_NAME}.AppImage"
            art="dsd-neo-linux-${arch}-portable-${REF_NAME}"
            ver="$REF_NAME"
          else
            out="dist/dsd-neo-linux-${arch}-portable-nightly.AppImage"
            art="dsd-neo-linux-${arch}-portable-nightly"
            ver="nightly"
          fi
          mkdir -p dist
          {
            echo "OUT=$out"
            echo "ART=$art"
            echo "VER=$ver"
          } >> "$GITHUB_OUTPUT"

      - name: Compute dependency SHAs (for cache key)
        id: dep-shas
        shell: bash
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'
          source tools/ci-dependency-pins.env
          case "$arch" in
            x86_64)
              image_ref="$APPIMAGE_UBUNTU_2004_AMD64_IMAGE"
              cmake_sha="$CMAKE_LINUX_X86_64_SHA256"
              ;;
            aarch64)
              image_ref="$APPIMAGE_UBUNTU_2004_ARM64_IMAGE"
              cmake_sha="$CMAKE_LINUX_AARCH64_SHA256"
              ;;
            *) echo "Unsupported arch: $arch" >&2; exit 1 ;;
          esac
          image_pin="${image_ref##*@}"
          image_pin="${image_pin#sha256:}"
          {
            echo "mbe_sha=$MBELIB_NEO_SHA"
            echo "codec2_sha=$CODEC2_SHA"
            echo "rtlsdr_sha=$RTL_SDR_SHA"
            echo "soapy_sdr_sha=$SOAPY_SDR_SHA"
            echo "soapy_sdr_root=/usr"
            echo "soapy_sdr_root_key=usr"
            echo "openssl_sha=$OPENSSL_SHA"
            echo "image_ref=$image_ref"
            echo "image_pin=$image_pin"
            echo "cmake_sha=$cmake_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare cache directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${APPIMAGE_DEPS_DIR}" "${APPIMAGE_CCACHE_DIR}"

      - name: Restore AppImage dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.APPIMAGE_DEPS_DIR }}
          key: deps-appimage-${{ runner.os }}-${{ matrix.arch }}-${{ steps.dep-shas.outputs.image_pin }}-${{ steps.dep-shas.outputs.cmake_sha }}-${{ steps.dep-shas.outputs.openssl_sha }}-${{ steps.dep-shas.outputs.mbe_sha }}-${{ steps.dep-shas.outputs.codec2_sha }}-${{ steps.dep-shas.outputs.rtlsdr_sha }}-${{ steps.dep-shas.outputs.soapy_sdr_sha }}-${{ steps.dep-shas.outputs.soapy_sdr_root_key }}
          restore-keys: |
            deps-appimage-${{ runner.os }}-${{ matrix.arch }}-

      - name: Validate AppImage dependency cache
        shell: bash
        run: |
          set -euxo pipefail
          mf="${APPIMAGE_DEPS_DIR}/.manifest"
          if [ -d "${APPIMAGE_DEPS_DIR}" ]; then
            if [ -f "$mf" ] &&
               grep -Fxq "mbe_sha=${{ steps.dep-shas.outputs.mbe_sha }}" "$mf" &&
               grep -Fxq "codec2_sha=${{ steps.dep-shas.outputs.codec2_sha }}" "$mf" &&
               grep -Fxq "rtlsdr_sha=${{ steps.dep-shas.outputs.rtlsdr_sha }}" "$mf" &&
               grep -Fxq "soapy_sdr_sha=${{ steps.dep-shas.outputs.soapy_sdr_sha }}" "$mf" &&
               grep -Fxq "soapy_sdr_root=${{ steps.dep-shas.outputs.soapy_sdr_root }}" "$mf" &&
               grep -Fxq "openssl_sha=${{ steps.dep-shas.outputs.openssl_sha }}" "$mf" &&
               grep -Fxq "image_ref=${{ steps.dep-shas.outputs.image_ref }}" "$mf" &&
               grep -Fxq "cmake_sha=${{ steps.dep-shas.outputs.cmake_sha }}" "$mf"; then
              echo "AppImage dependency cache manifest matches requested SHAs"
            else
              echo "AppImage dependency cache manifest is missing or stale; clearing ${APPIMAGE_DEPS_DIR}"
              rm -rf "${APPIMAGE_DEPS_DIR}"
            fi
          fi
          mkdir -p "${APPIMAGE_DEPS_DIR}"

      - name: Restore AppImage ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.APPIMAGE_CCACHE_DIR }}
          key: ccache-${{ runner.os }}-appimage-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-appimage-${{ matrix.arch }}-
      - name: Build in container and create AppImage
        shell: bash
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'
          source tools/ci-dependency-pins.env
          if [ "$arch" = 'x86_64' ]; then
            platform='linux/amd64'
            image="$APPIMAGE_UBUNTU_2004_AMD64_IMAGE"
          else
            platform='linux/arm64/v8'
            image="$APPIMAGE_UBUNTU_2004_ARM64_IMAGE"
          fi

          # Proactively pull the digest-pinned base image with retries.
          tries=0
          until docker pull --platform "$platform" "$image"; do
            tries=$((tries+1))
            echo "docker pull failed (attempt $tries)." >&2
            if [ $tries -ge 2 ]; then
              exit 1
            fi
            sleep 2
          done

          docker run --rm --platform "$platform" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e VERSION='${{ steps.names.outputs.VER }}' \
            -e MBE_SHA='${{ steps.dep-shas.outputs.mbe_sha }}' \
            -e CODEC2_SHA='${{ steps.dep-shas.outputs.codec2_sha }}' \
            -e RTLSDR_SHA='${{ steps.dep-shas.outputs.rtlsdr_sha }}' \
            -e SOAPY_SDR_SHA='${{ steps.dep-shas.outputs.soapy_sdr_sha }}' \
            -e SOAPY_SDR_RUNTIME_ROOT='${{ steps.dep-shas.outputs.soapy_sdr_root }}' \
            -e OPENSSL_SHA='${{ steps.dep-shas.outputs.openssl_sha }}' \
            -e DEPS_DIR="/work/.deps/appimage-${{ matrix.arch }}" \
            -e CCACHE_DIR="/work/.ccache/appimage-${{ matrix.arch }}" \
            -v "$GITHUB_WORKSPACE":/work -w /work "$image" \
            bash -lc '
              set -euo pipefail
              source /work/tools/ci-dependency-pins.env
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates wget git build-essential cmake ninja-build pkg-config ccache perl \
                libsndfile1-dev libpulse-dev libusb-1.0-0-dev libfftw3-dev libblas-dev liblapack-dev gfortran \
                libncurses-dev patchelf file squashfs-tools desktop-file-utils doxygen graphviz imagemagick \
                libboost-all-dev libarchive-dev libcurl4-openssl-dev zsync libglib2.0-dev \
                libzstd-dev liblzma-dev libgpgme-dev libgcrypt20-dev gnupg \
                libpng-dev libjpeg-dev cimg-dev

              # Install a newer CMake (>=3.20) than Ubuntu 20.04 provides
              arch=$(uname -m)
              case "$arch" in
                x86_64)
                  cmUrl=https://github.com/Kitware/CMake/releases/download/v3.27.9/cmake-3.27.9-linux-x86_64.sh
                  cmSha="$CMAKE_LINUX_X86_64_SHA256"
                  ;;
                aarch64)
                  cmUrl=https://github.com/Kitware/CMake/releases/download/v3.27.9/cmake-3.27.9-linux-aarch64.sh
                  cmSha="$CMAKE_LINUX_AARCH64_SHA256"
                  ;;
                *) echo "Unsupported arch: $arch" >&2; exit 1 ;;
              esac
              wget -qO /tmp/cmake.sh "$cmUrl"
              printf "%s  /tmp/cmake.sh\n" "$cmSha" | sha256sum -c -
              chmod +x /tmp/cmake.sh
              /tmp/cmake.sh --skip-license --prefix=/usr/local
              cmake --version

              : "${MBE_SHA:?MBE_SHA not set}"
              : "${CODEC2_SHA:?CODEC2_SHA not set}"
              : "${RTLSDR_SHA:?RTLSDR_SHA not set}"
              : "${SOAPY_SDR_SHA:?SOAPY_SDR_SHA not set}"
              : "${SOAPY_SDR_RUNTIME_ROOT:?SOAPY_SDR_RUNTIME_ROOT not set}"
              : "${OPENSSL_SHA:?OPENSSL_SHA not set}"
              mbe_sha="$MBE_SHA"
              codec2_sha="$CODEC2_SHA"
              rtlsdr_sha="$RTLSDR_SHA"
              soapy_sdr_sha="$SOAPY_SDR_SHA"
              soapy_sdr_root="$SOAPY_SDR_RUNTIME_ROOT"
              openssl_sha="$OPENSSL_SHA"

              mkdir -p "$CCACHE_DIR"
              export CCACHE_BASEDIR=/work
              export CCACHE_NOHASHDIR=true
              export CCACHE_SLOPPINESS=time_macros
              export CC="ccache gcc"
              export CXX="ccache g++"
              ccache --version || ccache -V
              ccache --zero-stats || ccache -z || true
              ccache --set-config=max_size=1G || ccache -M 1G || true
              ccache --set-config=compression=true || ccache -o compression=true || true

              DEPS="${DEPS_DIR:-/opt/deps}"
              mkdir -p "$DEPS"
              export PKG_CONFIG_PATH="$DEPS/lib/pkgconfig:$DEPS/lib64/pkgconfig:${PKG_CONFIG_PATH:-}"
              export CMAKE_PREFIX_PATH="$DEPS:${CMAKE_PREFIX_PATH:-}"
              export LD_LIBRARY_PATH="$DEPS/lib:$DEPS/lib64:${LD_LIBRARY_PATH:-}"

              build_openssl() {
                sha="$1"
                mf="$DEPS/.manifest"
                if { [ -f "$DEPS/lib/pkgconfig/libcrypto.pc" ] || [ -f "$DEPS/lib64/pkgconfig/libcrypto.pc" ]; } &&
                   [ -f "$mf" ] && grep -q "^openssl_sha=${sha}$" "$mf"; then
                  echo "Using cached OpenSSL in $DEPS"
                  return
                fi

                /work/tools/fetch-pinned-git.sh https://github.com/openssl/openssl.git "$sha" /tmp/openssl
                build_arch=$(uname -m)
                case "$build_arch" in
                  x86_64) openssl_target=linux-x86_64 ;;
                  aarch64) openssl_target=linux-aarch64 ;;
                  *) echo "Unsupported OpenSSL arch: $build_arch" >&2; exit 1 ;;
                esac
                (
                  cd /tmp/openssl
                  if ! ./Configure "$openssl_target" shared no-tests --prefix="$DEPS" --openssldir="$DEPS/ssl" \
                    > /tmp/openssl-configure.log 2>&1; then
                    tail -200 /tmp/openssl-configure.log >&2 || true
                    exit 1
                  fi
                  if ! make -s -j"$(nproc)" > /tmp/openssl-build.log 2>&1; then
                    tail -200 /tmp/openssl-build.log >&2 || true
                    exit 1
                  fi
                  if ! make -s install_sw > /tmp/openssl-install.log 2>&1; then
                    tail -200 /tmp/openssl-install.log >&2 || true
                    exit 1
                  fi
                )
              }

              build_dep() {
                repo="$1" sha="$2" name="$3" mf_key="$4" cmake_opts="$5"
                dst="$DEPS/lib/pkgconfig/${name}.pc"
                dst64="$DEPS/lib64/pkgconfig/${name}.pc"
                mf="$DEPS/.manifest"
                if [ -f "$dst" ] || [ -f "$dst64" ]; then
                  if [ -f "$mf" ] && grep -q "^${mf_key}=${sha}$" "$mf"; then
                    echo "Using cached ${name} in $DEPS"
                    return
                  fi
                  echo "Cached ${name} does not match desired SHA; rebuilding"
                fi
                /work/tools/fetch-pinned-git.sh "$repo" "$sha" "/tmp/${name}"
                cmake -S "/tmp/${name}" -B "/tmp/${name}/build" -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX="$DEPS" $cmake_opts
                cmake --build "/tmp/${name}/build" -j
                cmake --install "/tmp/${name}/build"
              }

              build_openssl "$openssl_sha"
              build_dep https://github.com/arancormonk/mbelib-neo "$mbe_sha" libmbe-neo mbe_sha ""
              build_dep https://github.com/arancormonk/codec2 "$codec2_sha" codec2 codec2_sha ""
              build_dep https://github.com/arancormonk/rtl-sdr "$rtlsdr_sha" librtlsdr rtlsdr_sha "-DDETACH_KERNEL_DRIVER=ON"
              build_dep https://github.com/pothosware/SoapySDR "$soapy_sdr_sha" SoapySDR soapy_sdr_sha \
                "-DENABLE_APPS=OFF -DENABLE_TESTS=OFF -DENABLE_DOCS=OFF -DENABLE_PYTHON=OFF -DENABLE_PYTHON3=OFF -DSOAPY_SDR_ROOT=$soapy_sdr_root"

              mf="$DEPS/.manifest"
              {
                echo "mbe_sha=$mbe_sha"
                echo "codec2_sha=$codec2_sha"
                echo "rtlsdr_sha=$rtlsdr_sha"
                echo "soapy_sdr_sha=$soapy_sdr_sha"
                echo "soapy_sdr_root=$soapy_sdr_root"
                echo "openssl_sha=$openssl_sha"
                echo "image_ref=${{ steps.dep-shas.outputs.image_ref }}"
                echo "cmake_sha=${{ steps.dep-shas.outputs.cmake_sha }}"
                echo "updated=$(date -u +%FT%TZ)"
              } > "$mf"

              pkg-config --modversion SoapySDR || true
              soapy_modules_cpp="/tmp/SoapySDR/build/lib/Modules.cpp"
              if [ -f "$soapy_modules_cpp" ]; then
                if ! grep -Fq "return \"$soapy_sdr_root\";" "$soapy_modules_cpp"; then
                  echo "ERROR: SoapySDR generated module loader does not use root $soapy_sdr_root" >&2
                  exit 1
                fi
              fi

              cmake -S . -B build/appimage -G Ninja -DCMAKE_BUILD_TYPE=Release -DDSD_ENABLE_LTO=OFF \
                -DDSD_REQUIRE_RTLSDR=ON -DDSD_REQUIRE_SOAPYSDR=ON \
                -DOPENSSL_ROOT_DIR="$DEPS" \
                -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_TESTING=OFF
              cmake --build build/appimage -j
              ./build/appimage/apps/dsd-cli/dsd-neo -h || true
              /work/tools/check_release_hardening.sh /work/build/appimage/apps/dsd-cli/dsd-neo /work/build/appimage

              rm -rf AppDir
              cmake --install build/appimage --prefix AppDir/usr

              docdir="AppDir/usr/share/doc/dsd-neo"
              required=(LICENSE COPYRIGHT THIRD_PARTY.md licenses/ezpwd-LGPL-2.1-or-later.txt licenses/pffft-FFTPACK.txt)
              for f in "${required[@]}"; do
                if [ ! -f "$docdir/$f" ]; then
                  echo "ERROR: missing required license file: $docdir/$f" >&2
                  exit 1
                fi
              done

              mkdir -p AppDir/usr/share/applications
              cp -f packaging/appimage/dsd-neo.desktop AppDir/usr/share/applications/
              mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
              src_icon="images/dsd-neo.png"; [ -f "$src_icon" ] || src_icon="images/dsd-neo_const_view.png"
              # Normalize to a valid square icon size
              convert "$src_icon" -resize 256x256^ -gravity center -extent 256x256 PNG32:/work/AppDir/usr/share/icons/hicolor/256x256/apps/dsd-neo.png

              host_multiarch="$(gcc -dumpmachine)"
              soapy_abi="$(sed -n "s/^#define SOAPY_SDR_ABI_VERSION \"\\([^\"]*\\)\"/\\1/p" "$DEPS/include/SoapySDR/Version.h" | head -n1)"
              if [ -z "$soapy_abi" ]; then
                echo "ERROR: could not read SoapySDR ABI version" >&2
                exit 1
              fi
              mkdir -p AppDir/apprun-hooks
              cat > AppDir/apprun-hooks/10-soapy-module-path.sh <<EOF
              soapy_module_paths="/usr/lib/${host_multiarch}/SoapySDR/modules${soapy_abi}:/usr/local/lib/${host_multiarch}/SoapySDR/modules${soapy_abi}:/usr/lib64/SoapySDR/modules${soapy_abi}:/usr/local/lib64/SoapySDR/modules${soapy_abi}:/usr/lib/SoapySDR/modules${soapy_abi}:/usr/local/lib/SoapySDR/modules${soapy_abi}"
              if [ -n "\${SOAPY_SDR_PLUGIN_PATH:-}" ]; then
                export SOAPY_SDR_PLUGIN_PATH="\${SOAPY_SDR_PLUGIN_PATH}:\${soapy_module_paths}"
              else
                export SOAPY_SDR_PLUGIN_PATH="\${soapy_module_paths}"
              fi
              unset soapy_module_paths
          EOF

              export OUTPUT="/work/${{ steps.names.outputs.OUT }}"
              mkdir -p "$(dirname "$OUTPUT")"
              export PATH="/usr/local/bin:$PATH"

              # Helper projects have nested CMake logic; use plain compilers here to avoid recursive ccache wrappers.
              export CC=gcc
              export CXX=g++
              cmake_common_opts=(
                -G Ninja
                -DCMAKE_BUILD_TYPE=Release
                -DCMAKE_C_COMPILER=gcc
                -DCMAKE_CXX_COMPILER=g++
              )

              echo "Building native appimagetool from pinned source..."
              /work/tools/fetch-pinned-git.sh https://github.com/AppImage/appimagetool.git "$APPIMAGETOOL_SHA" /tmp/appimagetool
              cmake -S /tmp/appimagetool -B /tmp/appimagetool/build "${cmake_common_opts[@]}"
              cmake --build /tmp/appimagetool/build --target appimagetool -j
              install -m0755 /tmp/appimagetool/build/src/appimagetool /usr/local/bin/appimagetool

              echo "Building native linuxdeploy from pinned source..."
              /work/tools/fetch-pinned-git.sh https://github.com/linuxdeploy/linuxdeploy.git "$LINUXDEPLOY_SHA" /tmp/linuxdeploy
              git -C /tmp/linuxdeploy submodule update --init --recursive
              git -C /tmp/linuxdeploy submodule status --recursive
              cmake -S /tmp/linuxdeploy -B /tmp/linuxdeploy/build "${cmake_common_opts[@]}" \
                -DBUILD_TESTING=OFF -DBUILD_TESTS=OFF -DENABLE_UNIT_TESTS=OFF -DENABLE_TESTS=OFF \
                -DLINUXDEPLOY_BUILD_TESTS=OFF
              cmake --build /tmp/linuxdeploy/build -j
              if [ -f /tmp/linuxdeploy/build/bin/linuxdeploy ]; then
                install -m0755 /tmp/linuxdeploy/build/bin/linuxdeploy /usr/local/bin/linuxdeploy
              elif [ -f /tmp/linuxdeploy/build/src/linuxdeploy ]; then
                install -m0755 /tmp/linuxdeploy/build/src/linuxdeploy /usr/local/bin/linuxdeploy
              else
                echo "linuxdeploy binary not found after build" >&2
                find /tmp/linuxdeploy/build -maxdepth 3 -type f -name linuxdeploy -print >&2
                exit 1
              fi

              echo "Building native linuxdeploy-plugin-appimage from pinned source..."
              /work/tools/fetch-pinned-git.sh https://github.com/linuxdeploy/linuxdeploy-plugin-appimage.git "$LINUXDEPLOY_PLUGIN_APPIMAGE_SHA" /tmp/linuxdeploy-plugin-appimage
              git -C /tmp/linuxdeploy-plugin-appimage submodule update --init --recursive
              git -C /tmp/linuxdeploy-plugin-appimage submodule status --recursive || true
              cmake -S /tmp/linuxdeploy-plugin-appimage -B /tmp/linuxdeploy-plugin-appimage/build "${cmake_common_opts[@]}" \
                -DBUILD_TESTING=OFF
              cmake --build /tmp/linuxdeploy-plugin-appimage/build -j
              if [ -f /tmp/linuxdeploy-plugin-appimage/build/bin/linuxdeploy-plugin-appimage ]; then
                install -m0755 /tmp/linuxdeploy-plugin-appimage/build/bin/linuxdeploy-plugin-appimage /usr/local/bin/linuxdeploy-plugin-appimage
              elif [ -f /tmp/linuxdeploy-plugin-appimage/build/src/linuxdeploy-plugin-appimage ]; then
                install -m0755 /tmp/linuxdeploy-plugin-appimage/build/src/linuxdeploy-plugin-appimage /usr/local/bin/linuxdeploy-plugin-appimage
              elif [ -f /tmp/linuxdeploy-plugin-appimage/build/linuxdeploy-plugin-appimage ]; then
                install -m0755 /tmp/linuxdeploy-plugin-appimage/build/linuxdeploy-plugin-appimage /usr/local/bin/linuxdeploy-plugin-appimage
              else
                echo "linuxdeploy-plugin-appimage binary not found after build" >&2
                find /tmp/linuxdeploy-plugin-appimage/build -maxdepth 3 -type f -name linuxdeploy-plugin-appimage -print >&2
                exit 1
              fi

              echo "linuxdeploy version: $(/usr/local/bin/linuxdeploy --version || true)"
              echo "appimagetool version: $(/usr/local/bin/appimagetool --version || true)"
              /usr/local/bin/linuxdeploy \
                --appdir /work/AppDir \
                -e /work/AppDir/usr/bin/dsd-neo \
                -d /work/packaging/appimage/dsd-neo.desktop \
                -i /work/AppDir/usr/share/icons/hicolor/256x256/apps/dsd-neo.png \
                --output appimage
              # Ensure the expected output file exists
              if [ ! -s "/work/${{ steps.names.outputs.OUT }}" ]; then
                echo "ERROR: AppImage output not produced at /work/${{ steps.names.outputs.OUT }}" >&2
                echo "Contents of current dir:" >&2
                ls -la >&2
                exit 1
              fi

              echo "ccache stats:"
              ccache -s || true
            '
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.ART }}
          path: ${{ steps.names.outputs.OUT }}
          retention-days: 7
      - name: Generate artifact SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          file: ${{ steps.names.outputs.OUT }}
          format: spdx-json
          output-file: ${{ steps.names.outputs.OUT }}.spdx.json
          artifact-name: ${{ steps.names.outputs.ART }}.spdx.json
          upload-artifact: true
          upload-release-assets: false
      - name: Attest artifact provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.names.outputs.OUT }}
      - name: Attest artifact SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.names.outputs.OUT }}
          sbom-path: ${{ steps.names.outputs.OUT }}.spdx.json

  publish-appimage:
    name: Publish AppImage (${{ matrix.arch }})
    needs: build-appimage
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'arancormonk/dsd-neo' &&
      (startsWith(github.ref, 'refs/tags/v') ||
      ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')))
    permissions:
      actions: read
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout release helpers
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare artifact naming
        id: names
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          arch='${{ matrix.arch }}'
          if [ "$REF_TYPE" = 'tag' ] && [ -n "$REF_NAME" ]; then
            out="dist/dsd-neo-linux-${arch}-portable-${REF_NAME}.AppImage"
            art="dsd-neo-linux-${arch}-portable-${REF_NAME}"
            title="dsd-neo ${REF_NAME#v}"
          else
            out="dist/dsd-neo-linux-${arch}-portable-nightly.AppImage"
            art="dsd-neo-linux-${arch}-portable-nightly"
            title="nightly"
          fi
          mkdir -p dist
          {
            echo "OUT=$out"
            echo "ART=$art"
            echo "RELEASE_TITLE=$title"
          } >> "$GITHUB_OUTPUT"
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.names.outputs.ART }}
          path: dist
      - name: Download package SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.names.outputs.ART }}.spdx.json
          path: dist
      - name: Normalize downloaded SBOM filename
        shell: bash
        run: |
          set -euo pipefail
          mv -f "dist/${{ steps.names.outputs.ART }}.spdx.json" "${{ steps.names.outputs.OUT }}.spdx.json"
      - name: Verify downloaded release files
        shell: bash
        run: |
          set -euo pipefail
          test -f "${{ steps.names.outputs.OUT }}"
          test -f "${{ steps.names.outputs.OUT }}.spdx.json"
      - name: Wait for release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: tools/ci_wait_for_release.sh
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          APPIMAGE_PATH: ${{ steps.names.outputs.OUT }}
          SBOM_PATH: ${{ steps.names.outputs.OUT }}.spdx.json
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${APPIMAGE_PATH}" \
            "${SBOM_PATH}" \
            --repo "${RELEASE_REPOSITORY}" \
            --clobber
      - name: Upload nightly assets (overwrite)
        if: >-
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.names.outputs.OUT }}
            ${{ steps.names.outputs.OUT }}.spdx.json
          overwrite_files: true
          fail_on_unmatched_files: true
          token: ${{ github.token }}
