              exit 0
            fi
            echo "Cached rtl-sdr does not match desired SHA; rebuilding"
          else
            if pkg-config --exists librtlsdr; then
              echo "Using system rtl-sdr"
              exit 0
            fi
          fi
          git clone --depth 1 https://github.com/arancormonk/rtl-sdr /tmp/rtl-sdr
          git -C /tmp/rtl-sdr fetch --depth 1 origin "$want_sha"
          git -C /tmp/rtl-sdr checkout "$want_sha"
          cmake -S /tmp/rtl-sdr -B /tmp/rtl-sdr/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DDETACH_KERNEL_DRIVER=ON -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX"
          cmake --build /tmp/rtl-sdr/build -j
          cmake --install /tmp/rtl-sdr/build

      - name: Update deps manifest
        run: |
          set -euxo pipefail
          mkdir -p "$DEPS_PREFIX"
          mf="$DEPS_PREFIX/.manifest"
          {
            echo "mbe_sha=${{ steps.dep-shas.outputs.mbe_sha }}"
            echo "codec2_sha=${{ steps.dep-shas.outputs.codec2_sha }}"
            echo "rtlsdr_sha=${{ steps.dep-shas.outputs.rtlsdr_sha }}"
            echo "updated=$(date -u +%FT%TZ)"
          } > "$mf"

      - name: Configure (asan-ubsan-debug)
        run: cmake --preset asan-ubsan-debug

      - name: Build (asan-ubsan-debug)
        run: cmake --build --preset asan-ubsan-debug --parallel

      - name: Test (asan-ubsan-debug)
        run: ctest --preset asan-ubsan-debug -V

      - name: Show ccache stats
        if: always()
        run: ccache -s

  cmake-install-rules:
    name: cmake install rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Check install(TARGETS) runtime destinations
        run: tools/check_install_runtime_destinations.sh

  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Compute PR changed files
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          tools/ci_changed_files.sh \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD \
            --no-header-expansion

      - name: Skip clang-format
        if: github.event_name == 'pull_request' && steps.changed.outputs.format_files == '0'
        run: echo "No C/C++ files to check."

      - name: Install clang-format
        if: github.event_name != 'pull_request' || steps.changed.outputs.format_files != '0'
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        if: github.event_name != 'pull_request' || steps.changed.outputs.format_files != '0'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t files < .ci/changed-files/format_files.txt
          else
            mapfile -t files < <(git ls-files '*.c' '*.cc' '*.cxx' '*.cpp' '*.h' '*.hpp' ':!:build/**')
          fi

          clang-format --version
          rc=0
          for f in "${files[@]}"; do
            if clang-format -n --Werror "$f" >/dev/null 2>&1; then
              continue
            fi
            if ! diff -u "$f" <(clang-format "$f") >/dev/null; then
              echo "Formatting issues found in ${f}"
              rc=1
            fi
          done
          if [[ $rc -ne 0 ]]; then
            echo "Run tools/format.sh."
            exit 1
          fi
          echo "Formatting OK"

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install cppcheck diff dependencies
        run: |
          sudo apt-get update
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            sudo apt-get install -y ripgrep
          else
            sudo apt-get install -y cppcheck ripgrep
          fi

      - name: Compute PR changed files
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          tools/ci_changed_files.sh \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head HEAD

      - name: Skip cppcheck
        if: github.event_name == 'pull_request' && steps.changed.outputs.cppcheck_sources == '0'
        run: echo "No changed source files for cppcheck."

      - name: Install cppcheck
        if: github.event_name == 'pull_request' && steps.changed.outputs.cppcheck_sources != '0'
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        if: github.event_name != 'pull_request' || steps.changed.outputs.cppcheck_sources != '0'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            mapfile -t files < .ci/changed-files/cppcheck_sources.txt
            tools/cppcheck.sh --strict -- "${files[@]}"
          else
            tools/cppcheck.sh --strict
          fi

      - name: Upload cppcheck output
        if: always() && (github.event_name != 'pull_request' || steps.changed.outputs.cppcheck_sources != '0')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cppcheck-report
          path: .cppcheck.local.out
          include-hidden-files: true
          retention-days: 7

