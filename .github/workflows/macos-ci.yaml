name: macos-ci

on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
    paths-ignore:
      - ".*"
      - "**/*.md"
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-portable-dmg:
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_ANALYTICS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute dependency SHAs (for cache key)
        id: dep-shas
        shell: bash
        run: |
          set -euo pipefail
          {
            source tools/ci-dependency-pins.env
            echo "mbe_sha=$MBELIB_NEO_SHA"
            echo "codec2_sha=$CODEC2_SHA"
            echo "rtlsdr_sha=$RTL_SDR_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare dependency environment
        shell: bash
        run: |
          set -euxo pipefail
          # Homebrew locations (arm64=/opt/homebrew, x86_64=/usr/local)
          HB_PREFIX=$(brew --prefix)
          {
            echo "DEPS_PREFIX=${GITHUB_WORKSPACE}/.deps"
            echo "HB_PREFIX=$HB_PREFIX"
            echo "PKG_CONFIG_PATH=${GITHUB_WORKSPACE}/.deps/lib/pkgconfig:${GITHUB_WORKSPACE}/.deps/lib64/pkgconfig:${HB_PREFIX}/lib/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "CMAKE_PREFIX_PATH=${GITHUB_WORKSPACE}/.deps:${HB_PREFIX}:/usr/local:${CMAKE_PREFIX_PATH:-}"
            echo "DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/.deps/lib:${GITHUB_WORKSPACE}/.deps/lib64:${DYLD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Restore dependency cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.DEPS_PREFIX }}
          key: deps-${{ runner.os }}-${{ steps.dep-shas.outputs.mbe_sha }}-${{ steps.dep-shas.outputs.codec2_sha }}-${{ steps.dep-shas.outputs.rtlsdr_sha }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Validate dependency cache
        shell: bash
        run: |
          set -euxo pipefail
          mf="$DEPS_PREFIX/.manifest"
          if [ -d "$DEPS_PREFIX" ]; then
            if [ -f "$mf" ] &&
               grep -Fxq "mbe_sha=${{ steps.dep-shas.outputs.mbe_sha }}" "$mf" &&
               grep -Fxq "codec2_sha=${{ steps.dep-shas.outputs.codec2_sha }}" "$mf" &&
               grep -Fxq "rtlsdr_sha=${{ steps.dep-shas.outputs.rtlsdr_sha }}" "$mf"; then
              echo "Dependency cache manifest matches requested SHAs"
            else
              echo "Dependency cache manifest is missing or stale; clearing $DEPS_PREFIX"
              rm -rf "$DEPS_PREFIX"
            fi
          fi
          mkdir -p "$DEPS_PREFIX"

      - name: Install base toolchain + libs (Homebrew)
        shell: bash
        run: |
          set -euxo pipefail
          # Many deps we build from source (cached) to align with Linux/Windows flows
          brew install cmake ninja pkg-config ccache \
            libsndfile pulseaudio fftw libusb ncurses soapysdr
          # Prefer Homebrew packages when available
          brew install codec2 rtl-sdr || true
          brew --version
          cmake --version
          pkg-config --version

      - name: Prepare ccache environment
        shell: bash
        run: |
          set -euxo pipefail
          {
            echo "CCACHE_DIR=${GITHUB_WORKSPACE}/.ccache"
            echo "CC=ccache clang"
            echo "CXX=ccache clang++"
            echo "CCACHE_BASEDIR=${GITHUB_WORKSPACE}"
            echo "CCACHE_NOHASHDIR=true"
            echo "CCACHE_SLOPPINESS=time_macros"
          } >> "$GITHUB_ENV"
          mkdir -p "${GITHUB_WORKSPACE}/.ccache"

      - name: Restore ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Initialize ccache
        shell: bash
        run: |
          ccache --version
          ccache --zero-stats
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true

      - name: Build and install mbelib-neo (required, cached)
        shell: bash
        run: |
          set -euxo pipefail
          mf="$DEPS_PREFIX/.manifest"
          want_sha='${{ steps.dep-shas.outputs.mbe_sha }}'
          pc1="$DEPS_PREFIX/lib/pkgconfig/libmbe-neo.pc"
          pc2="$DEPS_PREFIX/lib64/pkgconfig/libmbe-neo.pc"
          if [ -f "$pc1" ] || [ -f "$pc2" ]; then
            if [ -f "$mf" ] && grep -q "^mbe_sha=$want_sha$" "$mf"; then
              echo "Using cached mbelib-neo in $DEPS_PREFIX"
              exit 0
            fi
            echo "Cached mbelib-neo does not match desired SHA; rebuilding"
          fi
          tools/fetch-pinned-git.sh https://github.com/arancormonk/mbelib-neo "$want_sha" /tmp/mbelib-neo
          cmake -S /tmp/mbelib-neo -B /tmp/mbelib-neo/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build /tmp/mbelib-neo/build -j
          cmake --install /tmp/mbelib-neo/build

      - name: Ensure codec2 (cached fallback if not found)
        shell: bash
        run: |
          set -euxo pipefail
          mf="$DEPS_PREFIX/.manifest"
          want_sha='${{ steps.dep-shas.outputs.codec2_sha }}'
          pc1="$DEPS_PREFIX/lib/pkgconfig/codec2.pc"
          pc2="$DEPS_PREFIX/lib64/pkgconfig/codec2.pc"
          if [ -f "$pc1" ] || [ -f "$pc2" ]; then
            if [ -f "$mf" ] && grep -q "^codec2_sha=$want_sha$" "$mf"; then
              echo "Using cached codec2 in $DEPS_PREFIX"
              exit 0
            fi
            echo "Cached codec2 does not match desired SHA; rebuilding"
          else
            if pkg-config --exists codec2; then
              echo "Using system codec2"
              exit 0
            fi
          fi
          tools/fetch-pinned-git.sh https://github.com/arancormonk/codec2 "$want_sha" /tmp/codec2
          cmake -S /tmp/codec2 -B /tmp/codec2/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build /tmp/codec2/build -j
          cmake --install /tmp/codec2/build

      - name: Ensure RTL-SDR (cached fallback if not found)
        shell: bash
        run: |
          set -euxo pipefail
          mf="$DEPS_PREFIX/.manifest"
          want_sha='${{ steps.dep-shas.outputs.rtlsdr_sha }}'
          pc1="$DEPS_PREFIX/lib/pkgconfig/librtlsdr.pc"
          pc2="$DEPS_PREFIX/lib64/pkgconfig/librtlsdr.pc"
          if [ -f "$pc1" ] || [ -f "$pc2" ]; then
            if [ -f "$mf" ] && grep -q "^rtlsdr_sha=$want_sha$" "$mf"; then
              echo "Using cached rtl-sdr in $DEPS_PREFIX"
              exit 0
            fi
            echo "Cached rtl-sdr does not match desired SHA; rebuilding"
          else
            if pkg-config --exists librtlsdr; then
              echo "Using system rtl-sdr"
              exit 0
            fi
          fi
          tools/fetch-pinned-git.sh https://github.com/arancormonk/rtl-sdr "$want_sha" /tmp/rtl-sdr
          cmake -S /tmp/rtl-sdr -B /tmp/rtl-sdr/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DDETACH_KERNEL_DRIVER=ON \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build /tmp/rtl-sdr/build -j
          cmake --install /tmp/rtl-sdr/build

      - name: Update deps manifest
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$DEPS_PREFIX"
          mf="$DEPS_PREFIX/.manifest"
          {
            echo "mbe_sha=${{ steps.dep-shas.outputs.mbe_sha }}"
            echo "codec2_sha=${{ steps.dep-shas.outputs.codec2_sha }}"
            echo "rtlsdr_sha=${{ steps.dep-shas.outputs.rtlsdr_sha }}"
            echo "updated=$(date -u +%FT%TZ)"
          } > "$mf"

      - name: Show dependency versions
        shell: bash
        run: |
          set -euxo pipefail
          pkg-config --modversion codec2 || true
          pkg-config --modversion librtlsdr || true
          pkg-config --modversion SoapySDR || true
          pkg-config --modversion libpulse || true
          pkg-config --modversion sndfile || true

      - name: Configure (Release preset)
        shell: bash
        run: |
          cmake --preset dev-release -G Ninja \
            -DDSD_ENABLE_LTO=OFF -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DDSD_REQUIRE_RTLSDR=ON -DDSD_REQUIRE_SOAPYSDR=ON \
            -DBUILD_TESTING=OFF \
            -DCURSES_LIBRARY="$HB_PREFIX/opt/ncurses/lib/libncursesw.dylib" \
            -DCURSES_INCLUDE_PATH="$HB_PREFIX/opt/ncurses/include"

      - name: Build
        shell: bash
        run: |
          cmake --build --preset dev-release -j

      - name: Smoke test - show CLI help
        shell: bash
        run: |
          ./build/dev-release/apps/dsd-cli/dsd-neo -h || true

      - name: Verify release hardening
        shell: bash
        run: |
          tools/check_release_hardening.sh build/dev-release/apps/dsd-cli/dsd-neo build/dev-release

  package-portable-dmg:
    name: Package portable DMG
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    permissions:
      actions: read
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_ANALYTICS: "1"
